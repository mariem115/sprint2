<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-warning">
      <h4 class="mb-0">Modifier le Voyage (ID: {{ id }})</h4>
    </div>
    <div class="card-body">
      <form (ngSubmit)="onUpdate()" #f="ngForm">
        <div class="mb-3">
          <label for="destination" class="form-label">Destination</label>
          <input
            id="destination"
            type="text"
            class="form-control"
            name="destination"
            [(ngModel)]="voyage.destination"
            required
          />
        </div>

        <div class="mb-3">
          <label for="prix" class="form-label">Prix (TND)</label>
          <input
            id="prix"
            type="number"
            class="form-control"
            name="prix"
            [(ngModel)]="voyage.prix"
            required
          />
        </div>

        <div class="mb-3">
          <label for="dateDepart" class="form-label">Date Départ</label>
          <input
            id="dateDepart"
            type="date"
            class="form-control"
            name="dateDepart"
            [ngModel]="voyage.dateDepart | date: 'yyyy-MM-dd'"
            (ngModelChange)="voyage.dateDepart = $event"
            required
          />
        </div>

        <div class="mb-3">
          <label for="dateRetour" class="form-label">Date Retour</label>
          <input
            id="dateRetour"
            type="date"
            class="form-control"
            name="dateRetour"
            [ngModel]="voyage.dateRetour | date: 'yyyy-MM-dd'"
            (ngModelChange)="voyage.dateRetour = $event"
            required
          />
        </div>

        <div class="mb-3">
          <label for="circuit" class="form-label">Circuit</label>
          <select id="circuit" class="form-select" name="circuit" [(ngModel)]="voyage.idCircuit">
            <option [ngValue]="undefined">-- Aucun --</option>
            <option *ngFor="let c of circuits" [ngValue]="c.idCircuit">{{ c.nomCircuit }}</option>
          </select>
        </div>

        <button type="submit" class="btn btn-warning">Modifier</button>
      </form>

      <hr class="my-4" />

      <h5>Image du voyage</h5>
      <div *ngIf="voyage.imageUrl" class="mb-3">
        <img
          [src]="backendOrigin + voyage.imageUrl"
          class="img-thumbnail"
          style="max-width: 200px"
          alt="Image du voyage"
        />
      </div>
      <div class="mb-3">
        <label for="fileInput" class="form-label">Choisir une image</label>
        <input
          id="fileInput"
          type="file"
          class="form-control"
          accept="image/*"
          (change)="onFileSelected($event)"
        />
      </div>
      <button type="button" class="btn btn-primary me-2" (click)="uploadImage()" [disabled]="!selectedFile">
        Uploader l'image
      </button>
      <button type="button" class="btn btn-danger" (click)="deleteImage()" [disabled]="!voyage.imageUrl">
        Supprimer l'image
      </button>
      <div *ngIf="uploadMessage" class="mt-2 alert alert-info">{{ uploadMessage }}</div>
    </div>
  </div>
</div>
