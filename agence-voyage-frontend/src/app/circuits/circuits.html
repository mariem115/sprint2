<div class="container mt-4">
  <h2 class="mb-4">Liste des Circuits</h2>

  <table class="table table-striped table-bordered table-hover align-middle">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nom Circuit</th>
        <th>Description</th>
        <th class="text-center">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let circuit of circuits">
        <td>{{ circuit.idCircuit }}</td>
        <td>{{ circuit.nomCircuit }}</td>
        <td>{{ circuit.description }}</td>
        <td class="text-center">
          <a
            class="btn btn-warning btn-sm me-2"
            [routerLink]="['/edit-circuit', circuit.idCircuit]"
          >
            Modifier
          </a>
          <button class="btn btn-danger btn-sm" (click)="deleteCircuit(circuit)">
            Supprimer
          </button>
        </td>
      </tr>
      <tr *ngIf="circuits.length === 0">
        <td colspan="4" class="text-center text-muted">Aucun circuit disponible.</td>
      </tr>
    </tbody>
  </table>

  <h3 class="mt-5 mb-3">Vue en cartes</h3>
  <div class="row">
    <div class="col-md-6 col-lg-4" *ngFor="let c of circuits">
      <app-circuit-detail
        [circuit]="c"
        (deleteEvent)="deleteCircuit($event)"
        (editEvent)="onEditCircuit($event)"
      ></app-circuit-detail>
    </div>
  </div>
</div>
